name: Deploy

# Runs only when code lands on main (after a PR merge)
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Extra guard: only run when on main (already guaranteed by the trigger above)
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ─── Deploy Step ───────────────────────────────────────────────────────────
      # Replace this placeholder with your actual deploy command. Options:
      #
      # Docker:
      #   docker build -t bersaglio-fin . && docker push your-registry/bersaglio-fin
      #
      # npm publish:
      #   npm publish --access public
      #
      # VPS via SSH (add SSH_KEY and HOST secrets in GitHub repo settings):
      #   - uses: appleboy/ssh-action@v1
      #     with:
      #       host: ${{ secrets.HOST }}
      #       username: deploy
      #       key: ${{ secrets.SSH_KEY }}
      #       script: |
      #         cd /opt/bersaglio-fin && git pull && npm ci && npm run build && pm2 restart all
      #
      # ───────────────────────────────────────────────────────────────────────────
      - name: Deploy (placeholder)
        run: echo "Deploy step - configure for your environment"
