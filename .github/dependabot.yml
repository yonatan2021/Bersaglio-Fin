version: 2
updates:
  # Keep npm dependencies up to date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    # Limit open PRs to avoid noise
    open-pull-requests-limit: 10

  # Keep GitHub Actions versions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
